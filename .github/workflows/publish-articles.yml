name: Publish Articles

on:
  push:
    branches: [main]
    paths:
      - "content/articles/**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-articles
  cancel-in-progress: false

jobs:
  import-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ARTICLE_IMPORT_SECRET: ${{ secrets.ARTICLE_IMPORT_SECRET }}
      ARTICLE_IMPORT_URL: ${{ vars.ARTICLE_IMPORT_URL || 'https://blog.badger-tech.fun/api/internal/articles/import' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate article Markdown
        run: npm run articles:check

      - name: Import articles through production webhook
        run: npm run articles:publish:webhook
