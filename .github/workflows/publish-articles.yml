name: Publish Articles

on:
  push:
    branches: [main]
    paths:
      - "content/articles/**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-articles
  cancel-in-progress: false

jobs:
  server-poller-note:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Explain production publishing
        run: |
          echo "Production publishing is handled by the server-side poller:"
          echo "/var/www/pulse-mind/scripts/deploy/publish-articles-server.sh"
          echo "The poller keeps PostgreSQL private to the production server."
